<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Portrait photo placeholder</title>
  <desc id="desc">A neutral placeholder showing where Dr. Rani Shahwan's portrait can be added.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#244965"/>
      <stop offset="1" stop-color="#0b2033"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="20%" r="70%">
      <stop offset="0" stop-color="#a77a36" stop-opacity=".32"/>
      <stop offset="1" stop-color="#a77a36" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <circle cx="400" cy="350" r="145" fill="#dfe8e4" opacity=".84"/>
  <path d="M122 895c24-222 132-338 278-338s254 116 278 338" fill="#dfe8e4" opacity=".84"/>
  <circle cx="400" cy="350" r="178" fill="none" stroke="#eadfc9" stroke-opacity=".5" stroke-width="3"/>
  <path d="M88 92h118M88 92v118M712 908H594M712 908V790" fill="none" stroke="#eadfc9" stroke-opacity=".55" stroke-width="3"/>
  <text x="400" y="950" fill="#eadfc9" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" letter-spacing="4">PORTRAIT PHOTO</text>
</svg>
